<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Trailer frame -->
  <rect x="25" y="75" width="55" height="8" rx="2" fill="#2563EB"/>
  <!-- Axle -->
  <line x1="60" y1="83" x2="60" y2="90" stroke="#1E3A5F" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="50" cy="93" r="5" fill="#1E3A5F"/>
  <circle cx="50" cy="93" r="2" fill="#93C5FD"/>
  <circle cx="70" cy="93" r="5" fill="#1E3A5F"/>
  <circle cx="70" cy="93" r="2" fill="#93C5FD"/>
  <!-- Hitch -->
  <line x1="25" y1="79" x2="15" y2="79" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="13" cy="79" r="3" fill="#1D4ED8"/>
  <!-- Small mast -->
  <rect x="55" y="45" width="5" height="30" rx="1" fill="#1D4ED8"/>
  <!-- Short boom -->
  <line x1="58" y1="48" x2="82" y2="35" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <!-- Hook -->
  <line x1="82" y1="35" x2="82" y2="50" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M79 50 Q82 55 85 50" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
