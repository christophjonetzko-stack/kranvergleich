<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Truck body -->
  <rect x="20" y="72" width="50" height="16" rx="3" fill="#2563EB"/>
  <!-- Cab -->
  <rect x="15" y="65" width="20" height="23" rx="3" fill="#1D4ED8"/>
  <!-- Wheels -->
  <circle cx="30" cy="92" r="5" fill="#1E3A5F"/>
  <circle cx="30" cy="92" r="2" fill="#93C5FD"/>
  <circle cx="60" cy="92" r="5" fill="#1E3A5F"/>
  <circle cx="60" cy="92" r="2" fill="#93C5FD"/>
  <!-- Turntable -->
  <circle cx="55" cy="72" r="6" fill="#1D4ED8"/>
  <!-- Boom (telescopic) -->
  <line x1="55" y1="68" x2="90" y2="28" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="40" x2="98" y2="22" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Hook -->
  <line x1="98" y1="22" x2="98" y2="38" stroke="#93C5FD" stroke-width="2"/>
  <path d="M95 38 Q98 44 101 38" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Outrigger -->
  <line x1="18" y1="88" x2="10" y2="96" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="88" x2="80" y2="96" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
</svg>
