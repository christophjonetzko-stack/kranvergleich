<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Tower (vertical) -->
  <rect x="35" y="20" width="8" height="75" rx="1" fill="#1D4ED8"/>
  <!-- Tower lattice -->
  <line x1="35" y1="30" x2="43" y2="40" stroke="#93C5FD" stroke-width="1"/>
  <line x1="43" y1="30" x2="35" y2="40" stroke="#93C5FD" stroke-width="1"/>
  <line x1="35" y1="45" x2="43" y2="55" stroke="#93C5FD" stroke-width="1"/>
  <line x1="43" y1="45" x2="35" y2="55" stroke="#93C5FD" stroke-width="1"/>
  <line x1="35" y1="60" x2="43" y2="70" stroke="#93C5FD" stroke-width="1"/>
  <line x1="43" y1="60" x2="35" y2="70" stroke="#93C5FD" stroke-width="1"/>
  <!-- Slewing unit -->
  <rect x="30" y="18" width="18" height="6" rx="2" fill="#2563EB"/>
  <!-- Jib (horizontal boom) -->
  <line x1="48" y1="20" x2="100" y2="20" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <!-- Jib support cables -->
  <line x1="39" y1="14" x2="48" y2="20" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="39" y1="14" x2="80" y2="20" stroke="#93C5FD" stroke-width="1"/>
  <line x1="39" y1="14" x2="100" y2="20" stroke="#93C5FD" stroke-width="1"/>
  <!-- Counter jib -->
  <line x1="30" y1="20" x2="15" y2="20" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round"/>
  <!-- Counterweight -->
  <rect x="12" y="18" width="8" height="6" rx="1" fill="#1E3A5F"/>
  <!-- Trolley on jib -->
  <rect x="72" y="18" width="6" height="4" rx="1" fill="#2563EB"/>
  <!-- Hook cable -->
  <line x1="75" y1="22" x2="75" y2="45" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M72 45 Q75 51 78 45" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="28" y="92" width="22" height="5" rx="1" fill="#1E3A5F"/>
</svg>
