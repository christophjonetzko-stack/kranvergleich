<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Truck flatbed -->
  <rect x="15" y="70" width="65" height="14" rx="3" fill="#2563EB"/>
  <!-- Cab -->
  <rect x="10" y="62" width="20" height="22" rx="3" fill="#1D4ED8"/>
  <!-- Wheels -->
  <circle cx="22" cy="90" r="4.5" fill="#1E3A5F"/>
  <circle cx="22" cy="90" r="1.5" fill="#93C5FD"/>
  <circle cx="42" cy="90" r="4.5" fill="#1E3A5F"/>
  <circle cx="42" cy="90" r="1.5" fill="#93C5FD"/>
  <circle cx="68" cy="90" r="4.5" fill="#1E3A5F"/>
  <circle cx="68" cy="90" r="1.5" fill="#93C5FD"/>
  <!-- Crane base on truck -->
  <rect x="32" y="63" width="10" height="8" rx="2" fill="#1D4ED8"/>
  <!-- Knickarm (articulated boom) - first segment -->
  <line x1="37" y1="63" x2="55" y2="35" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
  <!-- Knickarm - second segment (knick) -->
  <line x1="55" y1="35" x2="90" y2="25" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Knick joint -->
  <circle cx="55" cy="35" r="3" fill="#1E3A5F"/>
  <!-- Hook -->
  <line x1="90" y1="25" x2="90" y2="42" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M87 42 Q90 48 93 42" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Load on flatbed -->
  <rect x="50" y="66" width="25" height="5" rx="1" fill="#93C5FD"/>
</svg>
