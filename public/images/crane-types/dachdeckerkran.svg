<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Truck base -->
  <rect x="25" y="80" width="35" height="10" rx="2" fill="#2563EB"/>
  <!-- Wheels -->
  <circle cx="33" cy="94" r="4" fill="#1E3A5F"/>
  <circle cx="33" cy="94" r="1.5" fill="#93C5FD"/>
  <circle cx="52" cy="94" r="4" fill="#1E3A5F"/>
  <circle cx="52" cy="94" r="1.5" fill="#93C5FD"/>
  <!-- Mast (vertical, tall) -->
  <rect x="40" y="25" width="5" height="55" rx="1" fill="#1D4ED8"/>
  <!-- Ladder/rail going up diagonally to roof -->
  <line x1="42" y1="30" x2="85" y2="20" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Bucket/platform on rail -->
  <rect x="75" y="17" width="14" height="8" rx="2" fill="#1D4ED8"/>
  <!-- Roof indication -->
  <line x1="80" y1="15" x2="105" y2="30" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Material on platform -->
  <rect x="78" y="19" width="4" height="4" rx="1" fill="#93C5FD"/>
  <rect x="83" y="19" width="3" height="4" rx="1" fill="#93C5FD"/>
</svg>
