<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Large truck body -->
  <rect x="15" y="68" width="60" height="18" rx="3" fill="#2563EB"/>
  <!-- Cab -->
  <rect x="10" y="60" width="22" height="26" rx="3" fill="#1D4ED8"/>
  <!-- Wheels (many axles) -->
  <circle cx="24" cy="92" r="4.5" fill="#1E3A5F"/>
  <circle cx="24" cy="92" r="1.5" fill="#93C5FD"/>
  <circle cx="38" cy="92" r="4.5" fill="#1E3A5F"/>
  <circle cx="38" cy="92" r="1.5" fill="#93C5FD"/>
  <circle cx="52" cy="92" r="4.5" fill="#1E3A5F"/>
  <circle cx="52" cy="92" r="1.5" fill="#93C5FD"/>
  <circle cx="66" cy="92" r="4.5" fill="#1E3A5F"/>
  <circle cx="66" cy="92" r="1.5" fill="#93C5FD"/>
  <!-- Turntable -->
  <circle cx="60" cy="68" r="6" fill="#1D4ED8"/>
  <!-- Long telescopic boom -->
  <line x1="60" y1="63" x2="95" y2="18" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round"/>
  <line x1="82" y1="35" x2="102" y2="14" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hook -->
  <line x1="102" y1="14" x2="102" y2="30" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M99 30 Q102 36 105 30" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Outriggers -->
  <line x1="12" y1="86" x2="5" y2="96" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="86" x2="85" y2="96" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
</svg>
