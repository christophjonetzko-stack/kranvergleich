<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect width="120" height="120" rx="12" fill="#EFF6FF"/>
  <!-- Tracks (left) -->
  <rect x="18" y="78" width="35" height="14" rx="7" fill="#1E3A5F"/>
  <rect x="20" y="80" width="31" height="10" rx="5" fill="#2563EB"/>
  <!-- Tracks (right) -->
  <rect x="62" y="78" width="35" height="14" rx="7" fill="#1E3A5F"/>
  <rect x="64" y="80" width="31" height="10" rx="5" fill="#2563EB"/>
  <!-- Upper body -->
  <rect x="30" y="65" width="55" height="15" rx="3" fill="#1D4ED8"/>
  <!-- Turntable -->
  <circle cx="58" cy="65" r="5" fill="#2563EB"/>
  <!-- Boom (lattice pattern) -->
  <line x1="58" y1="60" x2="38" y2="20" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="58" x2="36" y2="22" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <!-- Lattice cross lines -->
  <line x1="52" y1="50" x2="42" y2="45" stroke="#93C5FD" stroke-width="1"/>
  <line x1="49" y1="42" x2="39" y2="37" stroke="#93C5FD" stroke-width="1"/>
  <line x1="46" y1="34" x2="37" y2="29" stroke="#93C5FD" stroke-width="1"/>
  <!-- Hook -->
  <line x1="37" y1="20" x2="37" y2="35" stroke="#93C5FD" stroke-width="1.5"/>
  <path d="M34 35 Q37 41 40 35" stroke="#1D4ED8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Counterweight -->
  <rect x="72" y="67" width="12" height="10" rx="2" fill="#1E3A5F"/>
</svg>
